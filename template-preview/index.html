<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Client Visibility Report</title>
  <link rel="stylesheet" href="framework/radar/scan-radar3d.css">
  <style>
    body { background: #f6f8f6; color: #17211b; font-family: Inter, ui-sans-serif, system-ui, sans-serif; margin: 0; }
    .wrap { margin: 0 auto; max-width: 1140px; padding: 28px 24px 60px; }
    h1 { font-size: clamp(24px, 3vw, 34px); margin: 0 0 6px; }
    .lede { color: #64706a; margin: 0 0 22px; max-width: 760px; }
    .panel { background: #fff; border: 1px solid #d7dfd8; border-radius: 14px; box-shadow: 0 18px 40px -30px rgba(23,33,27,.45); padding: 18px; }
    .err { background:#fff7f7; border:1px solid #e9c9c9; border-left:5px solid #9b2424; border-radius:10px; padding:14px; color:#7a1f1f; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 id="title">Visibility over time</h1>
    <p class="lede">The 12-axis SEO/GEO/GDO scorecard scored over time. Face-on shows the
      per-axis shape; click any domain to drill into its submetrics, sources, and trend.
      Drag to orbit the tube of scans. Data lives in <code>data/timeline.json</code>.</p>
    <div class="panel"><div id="radar"></div></div>
  </div>
  <script src="framework/radar/scan-radar3d.js"></script>
  <script>
    // Title from CLIENT.json (filled by bootstrap); radar from the committed timeline.
    fetch("CLIENT.json").then(r => r.ok ? r.json() : {}).then(c => {
      if (c && c.name) { document.title = c.name + " — Visibility Report"; document.getElementById("title").textContent = c.name + " — visibility over time"; }
    }).catch(() => {}).finally(() => {
      ScanRadar3D.mount(document.getElementById("radar"), { dataUrl: "data/timeline.json" });
    });
  </script>
</body>
</html>
